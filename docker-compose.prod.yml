services:
  # ============================================================
  # TimescaleDB — Time-series + relational database
  # Tuned for 4GB server with co-tenants
  # ============================================================
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: fb-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-factorybrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-factorybrain}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=2MB
      -c maintenance_work_mem=32MB
      -c max_connections=20
      -c wal_buffers=4MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c huge_pages=off
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-factorybrain}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================================
  # Redis — Celery broker + cache (64MB is plenty for task queue)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: fb-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 96M

  # ============================================================
  # Mosquitto — MQTT broker for sensor telemetry
  # ============================================================
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: fb-mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./scripts/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqttdata:/mosquitto/data
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M

  # ============================================================
  # Backend — FastAPI application (1 worker)
  # ============================================================
  backend:
    build:
      context: ./backend
      target: api
    container_name: fb-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-factorybrain}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB:-factorybrain}
      REDIS_URL: redis://redis:6379/0
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: production
      DEBUG: "false"
      CORS_ORIGINS: ${DOMAIN_URL:-http://localhost:3000}
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================================
  # Celery Worker + Beat (merged, 1 concurrency)
  # ============================================================
  celery:
    build:
      context: ./backend
      target: celery-worker
    container_name: fb-celery
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-factorybrain}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB:-factorybrain}
      REDIS_URL: redis://redis:6379/0
      MQTT_HOST: mosquitto
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: production
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 192M

  # ============================================================
  # Frontend — Next.js standalone (~50MB RAM)
  # ============================================================
  frontend:
    build:
      context: ./frontend
    container_name: fb-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ""
      NEXT_PUBLIC_WS_URL: ""
    deploy:
      resources:
        limits:
          memory: 128M

  # NOTE: Caddy removed — use Coolify's built-in reverse proxy instead.
  # NOTE: MinIO removed — not needed until report generation is implemented.
  #       Re-add later or use Hetzner Object Storage (S3-compatible, external).

volumes:
  pgdata:
  redisdata:
  mqttdata:
